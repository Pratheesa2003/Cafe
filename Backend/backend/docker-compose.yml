version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cafe-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cafedb
      MYSQL_USER: cafeuser
      MYSQL_PASSWORD: cafe123
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: cafe-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cafedb?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: cafeuser
      SPRING_DATASOURCE_PASSWORD: cafe123
    ports:
      - "8083:8083"

volumes:
  mysql-data: