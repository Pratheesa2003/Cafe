name: Cafe Backend ACR Deployment

on:
  push:
    branches:
      - direct-deployment

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend
        working-directory: Backend/backend
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: cafebackendacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t cafebackendacr.azurecr.io/cafe-backend:latest \
            Backend/backend

      - name: Push Docker Image
        run: |
          docker push cafebackendacr.azurecr.io/cafe-backend:latest